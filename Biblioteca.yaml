openapi: 3.0.0
info:
  title: Biblioteca API
  version: 1.0.0
  description: Sistema de gestión de inventarios para biblioteca

servers:
  - url: http://localhost:3000

paths:

  # ==========================================
  # AUTORES
  # ==========================================
  /autores:
    get:
      tags:
        - Autores
      summary: Listar todos los autores
      operationId: getAutores
      responses:
        '200':
          description: Lista de autores obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Autor'
        '500':
          description: Error interno del servidor

    post:
      tags:
        - Autores
      summary: Crear un nuevo autor
      operationId: createAutor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutorInput'
      responses:
        '201':
          description: Autor creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Autor'
        '400':
          description: Datos inválidos o campos requeridos faltantes
        '500':
          description: Error interno del servidor

  /autores/{id_autor}:
    get:
      tags:
        - Autores
      summary: Obtener autor por ID
      operationId: getAutorById
      parameters:
        - name: id_autor
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Autor'
        '404':
          description: Autor no encontrado
        '500':
          description: Error interno del servidor

    put:
      tags:
        - Autores
      summary: Actualizar autor por ID
      operationId: updateAutor
      parameters:
        - name: id_autor
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutorInput'
      responses:
        '200':
          description: Autor actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Autor'
        '400':
          description: Datos inválidos
        '404':
          description: Autor no encontrado
        '500':
          description: Error interno del servidor

    delete:
      tags:
        - Autores
      summary: Eliminar autor por ID
      operationId: deleteAutor
      parameters:
        - name: id_autor
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Autor eliminado exitosamente
        '404':
          description: Autor no encontrado
        '500':
          description: Error interno del servidor

  /autores/{id_autor}/libros:
    get:
      tags:
        - Autores
      summary: Listar libros de un autor
      operationId: getLibrosByAutor
      parameters:
        - name: id_autor
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de libros del autor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LibroAutor'
        '404':
          description: Autor no encontrado
        '500':
          description: Error interno del servidor

  # ==========================================
  # LIBROS
  # ==========================================
  /libros:
    get:
      tags:
        - Libros
      summary: Listar todos los libros
      operationId: getLibros
      responses:
        '200':
          description: Lista de libros obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Libro'
        '500':
          description: Error interno del servidor

    post:
      tags:
        - Libros
      summary: Crear un nuevo libro
      operationId: createLibro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibroInput'
      responses:
        '201':
          description: Libro creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Libro'
        '400':
          description: Datos inválidos o campos requeridos faltantes
        '409':
          description: Ya existe un libro con ese ISBN
        '500':
          description: Error interno del servidor

  /libros/{id_libro}:
    get:
      tags:
        - Libros
      summary: Obtener libro por ID
      operationId: getLibroById
      parameters:
        - name: id_libro
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Libro encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Libro'
        '404':
          description: Libro no encontrado
        '500':
          description: Error interno del servidor

    put:
      tags:
        - Libros
      summary: Actualizar libro por ID
      operationId: updateLibro
      parameters:
        - name: id_libro
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibroInput'
      responses:
        '200':
          description: Libro actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Libro'
        '400':
          description: Datos inválidos
        '404':
          description: Libro no encontrado
        '500':
          description: Error interno del servidor

    delete:
      tags:
        - Libros
      summary: Eliminar libro por ID
      operationId: deleteLibro
      parameters:
        - name: id_libro
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Libro eliminado exitosamente
        '404':
          description: Libro no encontrado
        '500':
          description: Error interno del servidor

  # ==========================================
  # LIBROS - AUTORES (ASOCIACIONES)
  # ==========================================
  /libros/{id_libro}/autores:
    get:
      tags:
        - Libros
      summary: Listar autores de un libro
      operationId: getAutoresByLibro
      parameters:
        - name: id_libro
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de autores del libro
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LibroAutor'
        '404':
          description: Libro no encontrado
        '500':
          description: Error interno del servidor

    post:
      tags:
        - Libros
      summary: Asociar un autor a un libro
      operationId: addAutorToLibro
      parameters:
        - name: id_libro
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibroAutorInput'
      responses:
        '201':
          description: Autor asociado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibroAutor'
        '400':
          description: Datos inválidos
        '404':
          description: Libro o autor no encontrado
        '409':
          description: El autor ya está asociado a este libro
        '500':
          description: Error interno del servidor

  /libros/{id_libro}/autores/{id_autor}:
    delete:
      tags:
        - Libros
      summary: Eliminar asociación libro-autor
      operationId: removeAutorFromLibro
      parameters:
        - name: id_libro
          in: path
          required: true
          schema:
            type: integer
        - name: id_autor
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Asociación eliminada exitosamente
        '404':
          description: Asociación no encontrada
        '500':
          description: Error interno del servidor

  # ==========================================
  # PRÉSTAMOS
  # ==========================================
  /prestamos:
    get:
      tags:
        - Préstamos
      summary: Listar todos los préstamos
      operationId: getPrestamos
      responses:
        '200':
          description: Lista de préstamos obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prestamo'
        '500':
          description: Error interno del servidor

    post:
      tags:
        - Préstamos
      summary: Registrar un nuevo préstamo
      operationId: createPrestamo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrestamoInput'
      responses:
        '201':
          description: Préstamo registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prestamo'
        '400':
          description: Datos inválidos o campos requeridos faltantes
        '404':
          description: Libro o usuario no encontrado
        '409':
          description: No hay stock disponible del libro
        '500':
          description: Error interno del servidor

  /prestamos/{id_prestamo}:
    get:
      tags:
        - Préstamos
      summary: Obtener préstamo por ID
      operationId: getPrestamoById
      parameters:
        - name: id_prestamo
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Préstamo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prestamo'
        '404':
          description: Préstamo no encontrado
        '500':
          description: Error interno del servidor

    put:
      tags:
        - Préstamos
      summary: Actualizar préstamo (registrar devolución)
      operationId: updatePrestamo
      parameters:
        - name: id_prestamo
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrestamoUpdate'
      responses:
        '200':
          description: Préstamo actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prestamo'
        '400':
          description: Datos inválidos
        '404':
          description: Préstamo no encontrado
        '500':
          description: Error interno del servidor

    delete:
      tags:
        - Préstamos
      summary: Eliminar préstamo por ID
      operationId: deletePrestamo
      parameters:
        - name: id_prestamo
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Préstamo eliminado exitosamente
        '404':
          description: Préstamo no encontrado
        '500':
          description: Error interno del servidor

  # ==========================================
  # USUARIOS
  # ==========================================
  /usuarios:
    get:
      tags:
        - Usuarios
      summary: Listar todos los usuarios
      operationId: getUsuarios
      responses:
        '200':
          description: Lista de usuarios obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
        '500':
          description: Error interno del servidor

    post:
      tags:
        - Usuarios
      summary: Crear un nuevo usuario
      operationId: createUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          description: Datos inválidos o campos requeridos faltantes
        '409':
          description: Ya existe un usuario con ese email
        '500':
          description: Error interno del servidor

  /usuarios/{id_usuario}:
    get:
      tags:
        - Usuarios
      summary: Obtener usuario por ID
      operationId: getUsuarioById
      parameters:
        - name: id_usuario
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '404':
          description: Usuario no encontrado
        '500':
          description: Error interno del servidor

    put:
      tags:
        - Usuarios
      summary: Actualizar usuario por ID
      operationId: updateUsuario
      parameters:
        - name: id_usuario
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
      responses:
        '200':
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          description: Datos inválidos
        '404':
          description: Usuario no encontrado
        '500':
          description: Error interno del servidor

    delete:
      tags:
        - Usuarios
      summary: Eliminar usuario por ID
      operationId: deleteUsuario
      parameters:
        - name: id_usuario
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Usuario eliminado exitosamente
        '404':
          description: Usuario no encontrado
        '500':
          description: Error interno del servidor

# ==========================================
# COMPONENTES (ESQUEMAS)
# ==========================================
components:
  schemas:

    # --- Autores ---
    Autor:
      type: object
      properties:
        id_autor:
          type: integer
          example: 1
        nombre:
          type: string
          example: Gabriel García Márquez
        nacionalidad:
          type: string
          example: Colombiana

    AutorInput:
      type: object
      required:
        - nombre
      properties:
        nombre:
          type: string
          example: Gabriel García Márquez
        nacionalidad:
          type: string
          example: Colombiana

    # --- Libros ---
    Libro:
      type: object
      properties:
        id_libro:
          type: integer
          example: 1
        isbn:
          type: string
          example: 978-3-16-148410-0
        titulo:
          type: string
          example: Cien años de soledad
        anio_publicacion:
          type: integer
          example: 1967
        genero:
          type: string
          example: Realismo mágico
        stock_total:
          type: integer
          example: 5
        stock_disponible:
          type: integer
          example: 3

    LibroInput:
      type: object
      required:
        - isbn
        - titulo
        - stock_total
        - stock_disponible
      properties:
        isbn:
          type: string
          example: 978-3-16-148410-0
        titulo:
          type: string
          example: Cien años de soledad
        anio_publicacion:
          type: integer
          example: 1967
        genero:
          type: string
          example: Realismo mágico
        stock_total:
          type: integer
          example: 5
        stock_disponible:
          type: integer
          example: 3

    # --- Libro - Autor ---
    LibroAutor:
      type: object
      properties:
        id_libro:
          type: integer
          example: 1
        id_autor:
          type: integer
          example: 2

    LibroAutorInput:
      type: object
      required:
        - id_autor
      properties:
        id_autor:
          type: integer
          example: 2

    # --- Préstamos ---
    Prestamo:
      type: object
      properties:
        id_prestamo:
          type: integer
          example: 1
        id_libro:
          type: integer
          example: 3
        id_usuario:
          type: integer
          example: 2
        fecha_prestamo:
          type: string
          format: date
          example: 2025-04-15
        fecha_devolucion_esperada:
          type: string
          format: date
          example: 2025-04-29
        fecha_devolucion_real:
          type: string
          format: date
          nullable: true
          example: null
        estado:
          type: string
          enum: [activo, devuelto, vencido]
          example: activo

    PrestamoInput:
      type: object
      required:
        - id_libro
        - id_usuario
        - fecha_prestamo
        - fecha_devolucion_esperada
      properties:
        id_libro:
          type: integer
          example: 3
        id_usuario:
          type: integer
          example: 2
        fecha_prestamo:
          type: string
          format: date
          example: 2025-04-15
        fecha_devolucion_esperada:
          type: string
          format: date
          example: 2025-04-29

    PrestamoUpdate:
      type: object
      properties:
        fecha_devolucion_real:
          type: string
          format: date
          example: 2025-04-28
        estado:
          type: string
          enum: [activo, devuelto, vencido]
          example: devuelto

    # --- Usuarios ---
    Usuario:
      type: object
      properties:
        id_usuario:
          type: integer
          example: 1
        nombre:
          type: string
          example: Ana Torres
        email:
          type: string
          format: email
          example: ana.torres@email.com
        telefono:
          type: string
          example: "0991234567"
        estado:
          type: string
          enum: [activo, suspendido]
          example: activo

    UsuarioInput:
      type: object
      required:
        - nombre
        - email
      properties:
        nombre:
          type: string
          example: Ana Torres
        email:
          type: string
          format: email
          example: ana.torres@email.com
        telefono:
          type: string
          example: "0991234567"
        estado:
          type: string
          enum: [activo, suspendido]
          example: activo
